name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Lockfile freshness ──────────────────────────────────────────────────────
  lockfile:
    name: Lockfile up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify Cargo.lock is up-to-date
        run: cargo update --locked
        # `cargo update --locked` fails if Cargo.lock is stale (i.e., any
        # dependency in Cargo.toml does not match what is recorded in Cargo.lock).
        # This catches accidental Cargo.toml edits that weren't followed by a
        # `cargo update` / `cargo build` to refresh the lockfile.

  # ── Formatting ──────────────────────────────────────────────────────────────
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ── Clippy ──────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy (-D warnings, all targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update -y && sudo apt-get install -y protobuf-compiler
      # -D warnings: clippy lints are hard errors. RUSTFLAGS='-D warnings' (from
      # the top-level env) already promotes compiler warnings to errors; the
      # '-- -D warnings' suffix promotes clippy lints to errors as well.
      - run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - --all-features
          - --no-default-features
          - --features utilmd
          - --features mscons
          - --features aperak
          - --features contrl
          - --features invoic
          - --features orders
          - --features partin
          - --features remadv
          - --features reqote
          - --features iftsta
          - --features insrpt
          - --features ordchg
          - --features ordrsp
          - --features comdis
          - --features pricat
          - --features utilts
          - --features quotes
          - --features diagnostics
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p edi-energy ${{ matrix.features }}

  # ── Workspace tests (all crates except edi-energy feature matrix) ───────────
  test-workspace:
    name: Test workspace crates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update -y && sudo apt-get install -y protobuf-compiler
      # Exclude edi-energy (covered by the feature-matrix job above) and the
      # binary daemon (makod) which requires runtime-only feature flags.
      - run: cargo test --workspace --all-features --exclude edi-energy --exclude makod

  # ── makod binary and integration tests ──────────────────────────────────────
  test-makod:
    name: Test makod (binary + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Run all makod unit and integration tests. The slatedb feature is
      # enabled transitively via the production dep on mako-engine. The
      # `testing` feature of mako-engine is available via dev-dependencies
      # so integration tests can use InMemory stores.
      - name: cargo test makod
        run: cargo test -p makod --all-targets

  # ── energy-api feature-matrix ────────────────────────────────────────────────
  test-energy-api:
    name: Test energy-api (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - --features crypto
          - --features crypto,client,server
          - --features crypto,client,server,websocket
          - --no-default-features
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p energy-api ${{ matrix.features }}


  # ── Documentation ───────────────────────────────────────────────────────────
  doc:
    name: Documentation
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update -y && sudo apt-get install -y protobuf-compiler
      - run: cargo doc --no-deps --all-features

  # ── MSRV ────────────────────────────────────────────────────────────────────
  msrv:
    name: Minimum Supported Rust Version (1.94)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update -y && sudo apt-get install -y protobuf-compiler
      - run: cargo check --workspace --all-features

  # ── Deny ────────────────────────────────────────────────────────────────────
  deny:
    name: Licenses & Advisories (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  # ── xtask smoke ─────────────────────────────────────────────────────────────
  xtask:
    name: xtask builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build -p xtask
      - run: cargo run -p xtask -- help

  codegen-check:
    name: Codegen check (generated files are up-to-date)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo xtask codegen --check

  validate-profiles:
    name: Validate profiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo xtask validate-profiles

  validate-pruefids:
    name: Validate Pruefidentifikator coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Full informational scan (MISSING PIDs are warnings, not failures).
      - name: Coverage scan (informational)
        run: cargo xtask validate-pruefids
      # Hard gates: all message types currently have 100% PID fixture coverage.
      # These gates prevent regressions when new PIDs are added in future AHB
      # releases. Add new types here once their fixture coverage reaches 100%.
      - name: Coverage gate — aperak (strict)
        run: cargo xtask validate-pruefids --message-type aperak --strict
      - name: Coverage gate — comdis (strict)
        run: cargo xtask validate-pruefids --message-type comdis --strict
      - name: Coverage gate — iftsta (strict)
        run: cargo xtask validate-pruefids --message-type iftsta --strict
      - name: Coverage gate — insrpt (strict)
        run: cargo xtask validate-pruefids --message-type insrpt --strict
      - name: Coverage gate — invoic (strict)
        run: cargo xtask validate-pruefids --message-type invoic --strict
      - name: Coverage gate — mscons (strict)
        run: cargo xtask validate-pruefids --message-type mscons --strict
      - name: Coverage gate — ordchg (strict)
        run: cargo xtask validate-pruefids --message-type ordchg --strict
      - name: Coverage gate — orders (strict)
        run: cargo xtask validate-pruefids --message-type orders --strict
      - name: Coverage gate — ordrsp (strict)
        run: cargo xtask validate-pruefids --message-type ordrsp --strict
      - name: Coverage gate — partin (strict)
        run: cargo xtask validate-pruefids --message-type partin --strict
      - name: Coverage gate — pricat (strict)
        run: cargo xtask validate-pruefids --message-type pricat --strict
      - name: Coverage gate — quotes (strict)
        run: cargo xtask validate-pruefids --message-type quotes --strict
      - name: Coverage gate — remadv (strict)
        run: cargo xtask validate-pruefids --message-type remadv --strict
      - name: Coverage gate — reqote (strict)
        run: cargo xtask validate-pruefids --message-type reqote --strict
      - name: Coverage gate — utilmd (strict)
        run: cargo xtask validate-pruefids --message-type utilmd --strict
      - name: Coverage gate — utilts (strict)
        run: cargo xtask validate-pruefids --message-type utilts --strict
      # CONTRL is pid_exempt (no Prüfidentifikatoren) — the strict gate here
      # verifies that both fv20251001 and fv20260101 profiles exist and are valid
      # (prevents the FV2025-10-01 profile gap from reoccurring, see F-032).
      - name: Coverage gate — contrl (strict)
        run: cargo xtask validate-pruefids --message-type contrl --strict

  release-diff-smoke:
    name: release-diff smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        # Use a real cross-release diff so a broken diff tool is detected.
        # MSCONS fv20240401 → fv20251001 is a known non-trivial update.
        # release-diff exits 1 when differences are found (expected here); use
        # `|| true` so bash -e does not abort on the expected non-zero exit.
      - run: |
          out=$(cargo xtask release-diff --message-type mscons --from fv20240401 --to fv20251001 || true)
          echo "$out"
          echo "$out" | grep -q '##' || { echo 'ERROR: release-diff produced no section headers'; exit 1; }

  check-release-coverage:
    name: Release coverage check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo xtask check-release-coverage

  # ── Dockerfile lint ─────────────────────────────────────────────────────────
  # Validates all nine Dockerfile stages (makod, marktd, processd, invoicd,
  # edmd, obsd, plus the chef/planner/builder stages) without running a
  # full Rust compilation.  Catches syntax errors, broken COPY paths, and
  # invalid --target references before they reach the release pipeline.
  dockerfile-lint:
    name: Dockerfile lint (all targets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --check performs Dockerfile linting + build-graph validation without
      # invoking the builder backend or compiling any Rust code.
      # Each target is checked independently so failures are isolated.
      - name: Lint runtime (makod)
        run: docker buildx build --check --target runtime .

      - name: Lint marktd-runtime
        run: docker buildx build --check --target marktd-runtime .

      - name: Lint processd-runtime
        run: docker buildx build --check --target processd-runtime .

      - name: Lint invoicd-runtime
        run: docker buildx build --check --target invoicd-runtime .

      - name: Lint edmd-runtime
        run: docker buildx build --check --target edmd-runtime .

      - name: Lint obsd-runtime
        run: docker buildx build --check --target obsd-runtime .
