name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # needed to create GitHub Releases
  packages: write   # needed to push to ghcr.io

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Pre-flight checks ────────────────────────────────────────────────────────
  preflight:
    name: Pre-flight (fmt / clippy / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all-targets --all-features

      - name: Warning gate
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo check --all-targets --all-features

  # ── Profile validation ───────────────────────────────────────────────────────
  validate-profiles:
    name: Validate profiles
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build xtask
        run: cargo build -p xtask
      - name: validate-profiles
        run: cargo xtask validate-profiles
      - name: validate-pruefids
        run: cargo xtask validate-pruefids

  # ── Codegen drift check ──────────────────────────────────────────────────────
  codegen-check:
    name: Codegen drift check
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build xtask
        run: cargo build -p xtask
      - name: Codegen check (generated files must be up-to-date)
        run: cargo xtask codegen --check

  # ── Release diff summary (F-041) ────────────────────────────────────────────
  release-diff:
    name: Release diff (latest-1 → latest)
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build xtask
        run: cargo build -p xtask
      - name: Diff all message types (FV2025-10-01 → FV2026-10-01)
        id: diff
        run: |
          set -euo pipefail
          {
            echo "## Release diff — FV2025-10-01 → FV2026-10-01"
            echo ""
            for MT in utilmd mscons aperak contrl invoic remadv orders ordchg ordrsp; do
              echo "### ${MT^^}"
              # release-diff exits 1 when differences exist; capture output but
              # do NOT abort — we want to collect all diffs first, then decide.
              cargo xtask release-diff \
                --message-type "$MT" \
                --from fv20251001 \
                --to   fv20261001 \
                2>/dev/null || true
              echo ""
            done
          } | tee "$RUNNER_TEMP/release-diff.md"
          # Write to GitHub step summary so reviewers see the diff in the PR UI.
          cat "$RUNNER_TEMP/release-diff.md" >> "$GITHUB_STEP_SUMMARY"
        # This step is informational — it never blocks the release by itself.
        # Gate violations (unexpected removals) must be detected during validate-profiles.
        continue-on-error: true

  # ── Publish to crates.io ─────────────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [validate-profiles, codegen-check, release-diff]
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Publish edi-energy
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p edi-energy 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && ! echo "$out" | grep -qE "already uploaded|already exists on crates\.io"; then exit $rc; fi

      - name: Publish energy-api
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p energy-api 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && ! echo "$out" | grep -qE "already uploaded|already exists on crates\.io"; then exit $rc; fi

      - name: Publish redispatch-xml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p redispatch-xml 2>&1) && rc=0 || rc=$?
