name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # needed to create GitHub Releases
  packages: write   # needed to push to ghcr.io

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Pre-flight checks ────────────────────────────────────────────────────────
  preflight:
    name: Pre-flight (fmt / clippy / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all-targets --all-features

      - name: Warning gate
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo check --all-targets --all-features

  # ── Profile validation ───────────────────────────────────────────────────────
  validate-profiles:
    name: Validate profiles
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build xtask
        run: cargo build -p xtask
      - name: validate-profiles
        run: cargo xtask validate-profiles
      - name: validate-pruefids
        run: cargo xtask validate-pruefids

  # ── Codegen drift check ──────────────────────────────────────────────────────
  codegen-check:
    name: Codegen drift check
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build xtask
        run: cargo build -p xtask
      - name: Codegen check (generated files must be up-to-date)
        run: cargo xtask codegen --check

  # ── Release diff summary (F-041) ────────────────────────────────────────────
  release-diff:
    name: Release diff (latest-1 → latest)
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build xtask
        run: cargo build -p xtask
      - name: Diff all message types (FV2025-10-01 → FV2026-10-01)
        id: diff
        run: |
          set -euo pipefail
          {
            echo "## Release diff — FV2025-10-01 → FV2026-10-01"
            echo ""
            for MT in utilmd mscons aperak contrl invoic remadv orders ordchg ordrsp; do
              echo "### ${MT^^}"
              # release-diff exits 1 when differences exist; capture output but
              # do NOT abort — we want to collect all diffs first, then decide.
              cargo xtask release-diff \
                --message-type "$MT" \
                --from fv20251001 \
                --to   fv20261001 \
                2>/dev/null || true
              echo ""
            done
          } | tee "$RUNNER_TEMP/release-diff.md"
          # Write to GitHub step summary so reviewers see the diff in the PR UI.
          cat "$RUNNER_TEMP/release-diff.md" >> "$GITHUB_STEP_SUMMARY"
        # This step is informational — it never blocks the release by itself.
        # Gate violations (unexpected removals) must be detected during validate-profiles.
        continue-on-error: true

  # ── Publish to crates.io ─────────────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [validate-profiles, codegen-check, release-diff]
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Publish edi-energy
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p edi-energy 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && ! echo "$out" | grep -qE "already uploaded|already exists on crates\.io"; then exit $rc; fi

      - name: Publish energy-api
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p energy-api 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && ! echo "$out" | grep -qE "already uploaded|already exists on crates\.io"; then exit $rc; fi

      - name: Publish redispatch-xml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p redispatch-xml 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && ! echo "$out" | grep -qE "already uploaded|already exists on crates\.io"; then exit $rc; fi

      - name: Publish dvgw-edi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p dvgw-edi 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && ! echo "$out" | grep -qE "already uploaded|already exists on crates\.io"; then exit $rc; fi
      
      - name: Publish mako-as4
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p mako-as4 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && ! echo "$out" | grep -qE "already uploaded|already exists on crates\.io"; then exit $rc; fi
      
      - name: Publish mako-engine
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p mako-engine 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && ! echo "$out" | grep -qE "already uploaded|already exists on crates\.io"; then exit $rc; fi

      # Domain crates depend on mako-engine — publish after it.
      - name: Publish mako-gpke
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p mako-gpke 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && ! echo "$out" | grep -qE "already uploaded|already exists on crates\.io"; then exit $rc; fi

      - name: Publish mako-wim
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p mako-wim 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && ! echo "$out" | grep -qE "already uploaded|already exists on crates\.io"; then exit $rc; fi

      - name: Publish mako-wim-gas
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p mako-wim-gas 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && ! echo "$out" | grep -qE "already uploaded|already exists on crates\.io"; then exit $rc; fi

      - name: Publish mako-geli-gas
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p mako-geli-gas 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && ! echo "$out" | grep -qE "already uploaded|already exists on crates\.io"; then exit $rc; fi

      - name: Publish mako-mabis
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p mako-mabis 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && ! echo "$out" | grep -qE "already uploaded|already exists on crates\.io"; then exit $rc; fi

      - name: Publish mako-redispatch
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p mako-redispatch 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && ! echo "$out" | grep -qE "already uploaded|already exists on crates\.io"; then exit $rc; fi

      
      - name: Publish mako-gabi-gas
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p mako-gabi-gas 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && ! echo "$out" | grep -qE "already uploaded|already exists on crates\.io"; then exit $rc; fi

      - name: Publish mako-nbw
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          out=$(cargo publish -p mako-nbw 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ $rc -ne 0 ] && ! echo "$out" | grep -qE "already uploaded|already exists on crates\.io"; then exit $rc; fi

  # ── Docker build + push ──────────────────────────────────────────────────────
  #
  # Pushes to GitHub Container Registry (ghcr.io) as:
  #   ghcr.io/<owner>/makod:<version>   (e.g. ghcr.io/hupe1980/makod:0.6.0)
  #   ghcr.io/<owner>/makod:latest
  #
  # Requires:
  #   - packages: write  permission (granted below)
  #   - No additional secret: GITHUB_TOKEN is used automatically for ghcr.io
  #
  # The build uses the 4-stage cargo-chef + distroless Dockerfile at the
  # workspace root. Multi-platform: linux/amd64 + linux/arm64.
  # Dep layers are cached in the GitHub Actions cache backend.
  docker:
    name: Docker build + push (ghcr.io)
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for linux/arm64 cross-compilation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive tags and OCI labels from the git tag (e.g. v0.6.0 → 0.6.0 + latest).
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/makod
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=makod
            org.opencontainers.image.description=Mako process engine daemon — German energy market communication (MaKo/BDEW EDI@Energy)
            org.opencontainers.image.licenses=MIT OR Apache-2.0

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OCI_REVISION=${{ github.sha }}
            OCI_CREATED=${{ github.event.head_commit.timestamp }}
          # Cache dep layer between releases using the GitHub Actions cache backend.
          cache-from: type=gha,scope=makod-docker
          cache-to:   type=gha,scope=makod-docker,mode=max

