  # ── Docker build + push ──────────────────────────────────────────────────────
  #
  # Builds all six production daemon images and pushes to ghcr.io:
  #   ghcr.io/<owner>/makod:<version>    — EDIFACT process engine   :8080/:4080/:8090
  #   ghcr.io/<owner>/marktd:<version>   — Market Data Hub          :8180
  #   ghcr.io/<owner>/processd:<version> — Process Decision Engine  :8580
  #   ghcr.io/<owner>/invoicd:<version>  — INVOIC plausibility      :8280
  #   ghcr.io/<owner>/edmd:<version>     — Energy Data Management   :8380
  #   ghcr.io/<owner>/obsd:<version>     — Observability            :8480
  #
  # Each service uses its own Dockerfile target (see multi-stage Dockerfile).
  # Builds run in parallel via matrix. Cache scopes are per-service so that
  # layer reuse is maximised without cross-service cache pollution.
  #
  # Multi-platform: linux/amd64 + linux/arm64 (QEMU for arm64 cross-build).
  docker:
    name: Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: makod
            target: runtime
            description: "Mako process engine daemon — German energy market communication (MaKo/BDEW EDI@Energy)"
          - service: marktd
            target: marktd-runtime
            description: "Market Data Hub daemon — MaLo/MeLo/VersorgungsStatus/preisblaetter/EventBus fan-out"
          - service: processd
            target: processd-runtime
            description: "Process Decision Engine — NB STP (netz-checker) + LF E_0624 auto-response"
          - service: invoicd
            target: invoicd-runtime
            description: "INVOIC plausibility-check daemon — LF role, §22 MessZV receipt retention"
          - service: edmd
            target: edmd-runtime
            description: "Energy Data Management daemon — MSCONS meter readings, MeterBillingPeriod"
          - service: obsd
            target: obsd-runtime
            description: "Business-process observability daemon — KPI reports, §20 EnWG parity"
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for linux/arm64 cross-compilation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive versioned tags from the git tag (e.g. v0.7.0 → 0.7.0, 0.7, latest).
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ matrix.service }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.licenses=MIT OR Apache-2.0

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OCI_REVISION=${{ github.sha }}
            OCI_CREATED=${{ github.event.head_commit.timestamp }}
          # Separate cache scope per service — avoids cross-service layer eviction.
          cache-from: type=gha,scope=${{ matrix.service }}-docker
          cache-to:   type=gha,scope=${{ matrix.service }}-docker,mode=max

