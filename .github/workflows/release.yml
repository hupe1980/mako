  # ── Docker build + push ──────────────────────────────────────────────────────
  #
  # Improved pipeline — three stages, two key changes vs. the old design:
  #
  # 1. docker-builder now runs in PARALLEL with `publish` (needs: preflight, not publish).
  #    Previously it waited ~10-15 min for crates.io publishing before starting.
  #
  # 2. docker-builder now PUSHES the builder image to ghcr.io instead of push: false.
  #    Runtime jobs use it as cache-from=type=registry, guaranteeing a cache hit
  #    (no Rust recompilation in runtime stages, even on cache-size-eviction).
  #
  # 3. docker-bake replaces 12 separate docker jobs with 2 bake jobs (one per platform).
  #    docker buildx bake shares the builder stage across all 6 service targets,
  #    reducing job overhead from 12× to 2×.
  #
  # Wall-clock time target: ~25–30 min total (vs. 2+ h before).
  # Net job reduction:  20 jobs → 9 jobs  (2 builder + 2 bake + 6 manifest - 1 manifest)

  docker-builder:
    name: Docker — builder (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: preflight          # CHANGED: parallel with publish (was: needs publish)
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            tag: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            tag: linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build the shared `builder` stage on native hardware and PUSH it to GHCR.
      # Pushing (instead of push: false) lets the docker-bake jobs restore the
      # fully-compiled builder image via cache-from=type=registry — no Rust
      # recompilation in the runtime stage, even when the GHA cache is evicted.
      - name: Build and push Rust builder stage (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          platforms: ${{ matrix.platform }}
          push: true                            # CHANGED: was push: false
          tags: ghcr.io/${{ github.repository_owner }}/mako-builder:${{ matrix.tag }}
          build-args: |
            OCI_REVISION=${{ github.sha }}
            OCI_CREATED=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha,scope=mako-builder-${{ matrix.platform }}
          cache-to:   type=gha,scope=mako-builder-${{ matrix.platform }},mode=max

  # docker-bake replaces 12 separate docker jobs.
  # One bake invocation per platform builds all 6 service images from one build
  # graph, sharing the builder stage. Digests are exported for manifest merging.
  docker-bake:
    name: Docker — bake ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    needs: [docker-builder, publish]    # publish provides the semver version tag
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            tag: linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            tag: linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Build all 6 runtime images in one bake invocation.
      # cache-from=type=registry restores from the pushed builder image — guaranteed hit.
      # --metadata-file captures per-service OCI digests for the manifest job.
      - name: Bake all service images (${{ matrix.platform }})
        uses: docker/bake-action@v6
        id: bake
        with:
          files: docker-bake.hcl
          push: true
          set: |
            *.platform=${{ matrix.platform }}
            *.cache-from=type=registry,ref=ghcr.io/${{ github.repository_owner }}/mako-builder:${{ matrix.tag }}
            *.cache-from=type=gha,scope=mako-builder-${{ matrix.platform }}
            *.cache-to=
          provenance: false
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          VERSION: ${{ steps.version.outputs.version }}
          OCI_REVISION: ${{ github.sha }}
          OCI_CREATED:  ${{ github.event.head_commit.timestamp }}

      # Extract one digest artifact per service for the manifest merge step.
      - name: Export per-service digests
        run: |
          platform_safe="${{ matrix.platform }}"
          platform_safe="${platform_safe//\//-}"
          mkdir -p /tmp/digests
          for service in makod marktd processd invoicd edmd obsd \
                        netzbilanzd sperrd nis-syncd einsd \
                        tarifbd billingd accountingd vertragd \
                        portald agentd mabis-syncd; do
            digest=$(echo '${{ steps.bake.outputs.metadata }}' | jq -r --arg svc "$service" '.[$svc]["containerimage.digest"]')
            echo "${digest#sha256:}" > "/tmp/digests/${service}"
            echo "${service}: ${digest}"
          done
          echo "PLATFORM_SAFE=${platform_safe}" >> "$GITHUB_ENV"

      - name: Upload digest artifacts (${{ matrix.platform }})
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_SAFE }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Docker — manifest ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: docker-bake
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: makod
            description: "Mako process engine daemon — German energy market communication (MaKo/BDEW EDI@Energy)"
          - service: marktd
            description: "Market Data Hub daemon — MaLo/MeLo/VersorgungsStatus/preisblaetter/EventBus fan-out"
          - service: processd
            description: "Process Decision Engine — NB STP (netz-checker) + LF E_0624 auto-response"
          - service: invoicd
            description: "INVOIC plausibility-check daemon — LF role, §22 MessZV receipt retention"
          - service: edmd
            description: "Energy Data Management daemon — MSCONS meter readings, MeterBillingPeriod"
          - service: obsd
            description: "Business-process observability daemon — KPI reports, §20 EnWG parity"
          - service: netzbilanzd
            description: "NNE/KA/MMM/MSB/AWH billing daemon — NB role, GridSettlement, CalculationTrace"
          - service: sperrd
            description: "Sperrung execution tracking daemon — NB role, IFTSTA 21039 auto-dispatch"
          - service: nis-syncd
            description: "NIS/GIS grid topology import adapter — NB role, stateless, lifts STP to ≥95%"
          - service: einsd
            description: "Einspeiser Registry + EEG/KWKG Settlement daemon — 9 settlement schemes, 324 tests"
          - service: tarifbd
            description: "Product & Tariff Catalog daemon — LF role, EPEX §41a, B2B Angebote"
          - service: billingd
            description: "Energy Billing Engine daemon — LF role, 12 categories, XRechnung 3.0, §14a, §41a"
          - service: accountingd
            description: "Customer Account Ledger daemon — LF role, SEPA pain.008/001, auto-dunning, GDPR Art.17"
          - service: vertragd
            description: "Contract & Customer Management daemon — LF role, B2C+B2B, OIDC→MaLo auth gateway"
          - service: portald
            description: "Customer Portal gateway — LF role, REST+SSE, §41 EnWG self-service"
          - service: agentd
            description: "Multi-agent LLM orchestration daemon — 24 specialists, LanceDB RAG, MCP tools"
          - service: mabis-syncd
            description: "MaBiS UTILTS synchronisation daemon — ÜNB/NB role, Summenzeitreihe day-3/day-8"
    steps:
      - name: Download amd64 digests
        uses: actions/download-artifact@v4
        with:
          name: digests-linux-amd64
          path: /tmp/digests/amd64

      - name: Download arm64 digests
        uses: actions/download-artifact@v4
        with:
          name: digests-linux-arm64
          path: /tmp/digests/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ matrix.service }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.licenses=MIT OR Apache-2.0

      - name: Create and push multi-arch manifest for ${{ matrix.service }}
        run: |
          amd64=$(cat /tmp/digests/amd64/${{ matrix.service }})
          arm64=$(cat /tmp/digests/arm64/${{ matrix.service }})
          tags=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}')
          # shellcheck disable=SC2086
          docker buildx imagetools create $tags \
            "ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}@sha256:${amd64}" \
            "ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}@sha256:${arm64}"
