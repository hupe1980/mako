# ── GitHub Pages deployment ────────────────────────────────────────────────────
#
# Builds the Jekyll documentation site (docs/) and deploys it to GitHub Pages.
#
# Triggers:
#   • Push to `main` that touches docs/** or the workflow file itself.
#   • Manual dispatch (workflow_dispatch) for out-of-band doc fixes.
#
# Permissions:
#   • Minimum required: contents:read + pages:write + id-token:write.
#   • The "pages" environment is created automatically by GitHub on first deploy.
#
# Local preview:
#   cd docs && bundle install && bundle exec jekyll serve --livereload
#
name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Cancel in-progress runs on the same branch so only the latest push deploys.
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Jekyll site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for jekyll-github-metadata

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true    # caches gems in docs/vendor/bundle
          working-directory: docs

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: |
          bundle exec jekyll build \
            --baseurl "${{ steps.pages.outputs.base_path }}" \
            --destination ../_site
        env:
          JEKYLL_ENV: production
          PAGES_REPO_NWO: ${{ github.repository }}

      - name: Check for broken internal links (htmlproofer)
        # Non-blocking: warn on broken links but do not fail the build.
        # Remove `continue-on-error` once all external links are stable.
        continue-on-error: true
        run: |
          gem install html-proofer --no-document
          htmlproofer ../_site \
            --ignore-urls "/localhost/,/crates.io/,/docs.rs/" \
            --check-internal-hash \
            --no-enforce-https

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
