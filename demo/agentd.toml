      → §14a Steuerungsrabatt not yet applied — alert operator
      → Call marktd MCP to check konfigurationsprodukte for SR eligibility
   c. Category=GAS with no gasqualitaet annotation AND marktd.malo.gasqualitaet != H_GAS?
