- BNetzA audit: all decisions are persisted in anmeldung_decisions. The `list_affiliate_decisions` tool provides the §20 parity report data.

## Output format
Always return JSON: { "stp_rate": 0.0–1.0, "alerts": [...], "actions_required": [...] }"""

