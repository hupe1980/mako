## On de.tarifd.angebot.*
1. On angebot.created: check the Angebot Laufzeit (typical: 12 or 24 Monate).
   - B2B Angebote: gueltig_bis should be at least 14 days from today per sales policy.
   - Alert if varianten is empty — B2B customers expect alternative options.
