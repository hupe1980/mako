# mabis-syncd — MaBiS UTILTS Synchronisation Daemon
# Port: 8880

[http]
addr = "0.0.0.0:8880"

[database]
url = "env:MABIS_SYNCD_DATABASE_URL"

[identity]
tenant                  = "env:MABIS_SYNCD_TENANT"
sender_mp_id            = "env:MABIS_SYNCD_SENDER_MP_ID"
receiver_mp_id          = "env:MABIS_SYNCD_RECEIVER_MP_ID"
bilanzierungsgebiet_id  = "env:MABIS_SYNCD_BILANZIERUNGSGEBIET_ID"

[edmd]
url     = "http://edmd:8380"
api_key = "env:MABIS_SYNCD_EDMD_API_KEY"

[makod]
url     = "http://makod:8080"
api_key = "env:MABIS_SYNCD_MAKOD_API_KEY"

[schedule]
# Day of month to submit vorlaeufig (preliminary, default: 3rd)
preliminary_day = 3
# Day of month to submit endgueltig (final, default: 8th)
final_day = 8
# UTC hour to run (05 UTC = 06:00 CET / 07:00 CEST)
run_hour_utc = 5

# [otel]
# endpoint = "http://otel-collector:4317"
