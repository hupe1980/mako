# billingd.toml — demo configuration
# Multi-product billing engine (LF role).
# Pulls product definitions from tarifbd, consumption from edmd,
# grid pass-through from marktd. Produces BO4E Rechnung.
# DO NOT use in production — auth disabled.

# database_url is injected via BILLINGD_DATABASE_URL env var
database_url = "postgres://demo:demo-secret@postgres/billingd"
port         = 9280
tenant       = "9910000000002"   # operator LF BDEW-Codenummer

# Required upstream services
tarifbd_url = "http://tarifbd:9080"
edmd_url    = "http://edmd:8380"
marktd_url  = "http://marktd:8180"
# marktd_api_key = ""  # set via BILLINGD_MARKTD_API_KEY env var

# Optional: ERP webhook for de.billing.rechnung.erstellt CloudEvents
# erp_webhook_url = "http://erp:8000/webhooks/billing"
# erp_hmac_secret = ""  # set via BILLINGD_ERP_HMAC_SECRET env var

# §3 StromStG: Stromsteuer 2.05 ct/kWh (valid since 01.07.2023)
# stromsteuer_ct_per_kwh = "0.0205"

# Standard MwSt rate
# mwst_rate = "0.19"

# Seller VAT ID for XRechnung / ZUGFeRD output (B2G mandate 01.01.2027)
# seller_vat_id = "DE123456789"

# [oidc]  — omit to disable auth (dev mode only)
# [otel]
# endpoint = "http://otel-collector:4317"
