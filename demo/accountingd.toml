# accountingd.toml — demo configuration
# Massenkontokorrent / Customer Account Ledger daemon (LF role).
# Subscribes to de.billing.rechnung.erstellt + de.invoic.receipt.settled + de.eeg.verguetung.berechnet.
# Manages Offene Posten, Zahlungszuordnung, SEPA mandates, Mahnwesen.
# DO NOT use in production — auth disabled.

# database_url is injected via ACCOUNTINGD_DATABASE_URL env var
database_url = "postgres://demo:demo-secret@postgres/accountingd"
port         = 9380
tenant       = "9910000000002"   # data-isolation key (any stable string; typically the operator’s BDEW- or DVGW-Codenummer)

# Optional: ERP webhook for outbound CloudEvents (Mahnwesen, Sperrauftrag, etc.)
# erp_webhook_url = "http://erp:8000/webhooks/accounting"
# erp_hmac_secret = ""  # set via ACCOUNTINGD_ERP_HMAC_SECRET env var

# Optional: sperrd URL for auto-trigger on Mahnstufe 3
# sperrd_url = "http://sperrd:8780"

# Dunning fees in ct (× 10⁻² EUR)
dunning_fee_stufe1_ct = 0        # Reminder — no fee
dunning_fee_stufe2_ct = 500      # Warning — 5.00 EUR
dunning_fee_stufe3_ct = 1000     # Legal notice — 10.00 EUR

# Days after invoice before sending Mahnstufe 1
dunning_grace_days = 30

# [oidc]  — omit to disable auth (dev mode only)
# [otel]
# endpoint = "http://otel-collector:4317"

# MCP server Bearer token — set a strong secret in production.
# mcp_api_key = ""  # set via ACCOUNTINGD_MCP_API_KEY env var
