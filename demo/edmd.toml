# edmd.toml — demo configuration (PostgreSQL, auth disabled)
# DO NOT use in production.
#
# edmd is the Energy Data Management daemon:
#   - Ingests MSCONS meter readings from makod via marktd EventBus
#   - Stores meter time-series and pre-aggregates MeterBillingPeriod (Strom + Gas)
#   - Provides /api/v1/billing-period to netzbilanzd for NNE / §14a ToU billing
#   - Provides /api/v1/imbalance to invoicd for Mehr-/Mindermengen reconciliation
#   - Archives meter_reads > retention_months to Apache Iceberg V2 on S3 for OLAP MMM

[http]
addr = "0.0.0.0:8380"

[database]
# edmd owns its own database (microservices DB autonomy).
# url is injected via EDMD_DATABASE__URL env var
url       = "postgres://demo:demo-secret@postgres/edmd"
pool_size = 10

[identity]
# Tenant identifier for Cedar resource checks.
tenant = "9900357000004"

[marktd]
url     = "http://marktd:8180"
# api_key is injected via EDMD_MARKTD__API_KEY env var
api_key = ""

[webhook]
# inbound_secret is injected via EDMD_WEBHOOK__INBOUND_SECRET env var
inbound_secret = ""

[subscription]
# Self-registers with marktd on startup.
webhook_url   = "http://edmd:8380/webhook"
subscriber_id = "edmd"
event_types   = [
  "de.mako.process.initiated",
  "de.mako.process.completed",
  "de.mako.edifact.inbound",
]

# [archive]  — Apache Iceberg / S3 cold-tier archival
# Uncomment to enable. Set storage_uri to your S3 bucket (or use endpoint_url for MinIO).
# Table metadata is stored in the same PostgreSQL database (iceberg_catalog schema).
# enabled                = true
# storage_uri            = "s3://my-bucket/edmd/meter_reads"
# access_key_id          = "env:AWS_ACCESS_KEY_ID"
# secret_access_key      = "env:AWS_SECRET_ACCESS_KEY"
# region                 = "eu-central-1"
# endpoint_url           = "http://minio:9000"   # MinIO / LocalStack / Ceph RGW
# retention_months       = 12
# batch_size             = 100000
# interval_secs          = 3600
# iceberg_catalog_schema = "iceberg_catalog"
# iceberg_catalog_name   = "edmd"


[webhook]
# inbound_secret is injected via EDMD_WEBHOOK__INBOUND_SECRET env var
inbound_secret = ""
# ERP webhook for outbound CloudEvents: de.edmd.reading.direct.stored + de.edmd.reading.quality.warning
# erp_webhook_url = "http://marktd:8180/api/v1/events"

[subscription]
# Self-registers with marktd on startup.
webhook_url   = "http://edmd:8380/webhook"
subscriber_id = "edmd"
event_types   = [
  "de.mako.process.initiated",
  "de.mako.process.completed",
  "de.mako.edifact.inbound",
]

# [oidc]  — omit to disable auth (dev mode only)
# issuer   = "https://login.microsoftonline.com/{tenant-id}/v2.0"
# audience = "api://mako-edmd"

# [otel]
# endpoint = "http://otel-collector:4317"
