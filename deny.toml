reason  = "miette 7.x depends on both unicode-width 0.1 (direct) and 0.2 (via textwrap 0.16). Resolves when miette or textwrap aligns on a single version."

[advisories]
ignore = [
    # RUSTSEC-2025-0141: bincode 1.x unmaintained.
    # Pulled transitively by slatedb → foyer. The crate is functionally complete
    # (the authors declared v1.3.3 final); no security impact in our usage
    # (serialization for internal SlateDB structures, not user-controlled input).
    # Resolve when slatedb migrates to bincode 2.x or an alternative.
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.x pulled by slatedb/foyer; functionally complete, no CVE, no user-controlled input" },
    # RUSTSEC-2024-0436: paste macro unmaintained (dtolnay archived the repo).
    # The crate is syntactically stable; no security surface. Used by slatedb
    # proc-macro machinery. Resolve when slatedb migrates away.
    { id = "RUSTSEC-2024-0436", reason = "paste macro pulled by slatedb; no CVE, compile-time only, no runtime security surface" },
    # RUSTSEC-2025-0134: rustls-pemfile unmaintained (thin wrapper around
    # rustls-pki-types). Pulled transitively by object_store or slatedb.
    # Migration path: update dependent to use rustls-pki-types ≥ 1.9.0 directly.
    # Resolve on next annual dependency update pass.
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile pulled by slatedb/object_store; thin wrapper around rustls-pki-types, no security regression" },
    # RUSTSEC-2026-0187: lopdf stack-overflow via deeply nested PDF objects.
    # Affects `xtask extract-pdf` which processes BDEW specification PDFs from
    # docs/pdfs/ on developer machines — not untrusted/attacker-controlled input.
    # Impact: developer-machine SIGABRT only; no production code path.
    # Resolution: bump pdf-extract to a version that depends on lopdf ≥ 0.42.0
    # once such a release is published upstream (pdf-extract 0.10 pins 0.38).
    { id = "RUSTSEC-2026-0187", reason = "lopdf DoS only reachable via xtask extract-pdf on BDEW PDFs (trusted developer input). Resolve when pdf-extract ships a release requiring lopdf ≥ 0.42." },
]
