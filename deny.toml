[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CDLA-Permissive-2.0",
    "MIT-0",
    # 0BSD: public-domain-like permissive license, used by mailparse and quoted_printable
    # (transitive deps via asx-rs). Acceptable for commercial use — effectively no conditions.
    "0BSD",
]
confidence-threshold = 0.9

[bans]
# Hard-deny multiple major-version duplicates. Any new duplicate requires an
# explicit `skip` entry with a justification comment. This prevents silent
# binary-size bloat and version-skew bugs in serialization/crypto crates.
multiple-versions = "deny"
# Deny wildcard version constraints for external (registry) dependencies.
# Path-only workspace-internal deps are exempt (`allow-wildcard-paths = true`)
# because they have no semver version to specify.
wildcards = "deny"
allow-wildcard-paths = true
deny = [
    # openssl-sys (and its peers openssl, openssl-macros) is banned for general
    # TLS use. The workspace uses rustls-tls exclusively for HTTP clients
    # (reqwest, object_store). However, openssl is an ACCEPTED exception for
    # WS-Security XML cryptography (RSA/ECDSA signing and X.509 handling) via
    # `asx-rs/crypto`, which has no pure-Rust equivalent with the same X.509
    # PEM handling surface.
    #
    # The `wrappers` field permits a banned crate when it is pulled only by the
    # listed direct parents.  Provenance chain:
    #   asx-rs → openssl → openssl-sys
    #   asx-rs → openssl → openssl-macros (proc-macro companion)
    # Only top-level `openssl` is directly pulled by `asx-rs`.
    # If any OTHER crate pulls openssl into the tree, cargo deny will still fail.
    { name = "openssl",        wrappers = ["asx-rs"],       reason = "C-linked OpenSSL forbidden for TLS; permitted only via asx-rs WS-Security XML crypto" },
    { name = "openssl-sys",    wrappers = ["openssl"],      reason = "C-binding companion to openssl 0.10; same asx-rs WS-Security exception" },
    { name = "openssl-macros", wrappers = ["openssl"],      reason = "proc-macro companion to openssl 0.10; same asx-rs WS-Security exception" },
]

# ── Skip entries for unavoidable transitive duplicates ───────────────────────
#
# Each entry documents WHY the duplicate exists and what would resolve it.
# Review and tighten on every annual dependency update pass.

[[bans.skip]]
name    = "arrayvec"
version = "0.5"
reason  = "cedar-policy-formatter (transitive dep of cedar-policy 4) depends on arrayvec 0.5; ecosystem crates use 0.7. Resolve when cedar-policy-formatter updates."

[[bans.skip]]
name    = "thiserror"
version = "1"
reason  = "slatedb 0.13 and several ecosystem crates (foyer, object_store) still depend on thiserror 1.x. Workspace crates use thiserror 2. Resolve when slatedb bumps to thiserror 2."

[[bans.skip]]
name    = "thiserror-impl"
version = "1"
reason  = "proc-macro companion of thiserror 1.x; same root cause as thiserror duplicate."

[[bans.skip]]
name    = "hashbrown"
version = "0.14"
reason  = "indexmap 2.x depends on hashbrown 0.14. Ecosystem migration to 0.15+ in progress."

[[bans.skip]]
name    = "hashbrown"
version = "0.15"
reason  = "lru and tokio-util pull hashbrown 0.15. Resolves when upstream crates align on 0.16."

[[bans.skip]]
name    = "hashbrown"
version = "0.16"
reason  = "foyer-memory/slatedb pull hashbrown 0.16. Resolves when foyer aligns on 0.17."

[[bans.skip]]
name    = "getrandom"
