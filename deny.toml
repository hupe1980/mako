[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CDLA-Permissive-2.0",
    "MIT-0",
    # 0BSD: public-domain-like permissive license, used by mailparse and quoted_printable
    # (transitive deps via asx-rs). Acceptable for commercial use — effectively no conditions.
    "0BSD",
]
confidence-threshold = 0.9

[bans]
# Hard-deny multiple major-version duplicates. Any new duplicate requires an
# explicit `skip` entry with a justification comment. This prevents silent
# binary-size bloat and version-skew bugs in serialization/crypto crates.
multiple-versions = "deny"
# Deny wildcard version constraints for external (registry) dependencies.
# Path-only workspace-internal deps are exempt (`allow-wildcard-paths = true`)
# because they have no semver version to specify.
wildcards = "deny"
allow-wildcard-paths = true
deny = [
    # openssl-sys (and its peers openssl, openssl-macros) is banned for general
    # TLS use. The workspace uses rustls-tls exclusively for HTTP clients
    # (reqwest, object_store). However, openssl is an ACCEPTED exception for
    # WS-Security XML cryptography (RSA/ECDSA signing and X.509 handling) via
    # `asx-rs/crypto`, which has no pure-Rust equivalent with the same X.509
    # PEM handling surface.
    #
    # The `wrappers` field permits a banned crate when it is pulled only by the
    # listed direct parents.  Provenance chain:
    #   asx-rs → openssl → openssl-sys
    #   asx-rs → openssl → openssl-macros (proc-macro companion)
    # Only top-level `openssl` is directly pulled by `asx-rs`.
    # If any OTHER crate pulls openssl into the tree, cargo deny will still fail.
    { name = "openssl",        wrappers = ["asx-rs"],       reason = "C-linked OpenSSL forbidden for TLS; permitted only via asx-rs WS-Security XML crypto" },
    { name = "openssl-sys",    wrappers = ["openssl"],      reason = "C-binding companion to openssl 0.10; same asx-rs WS-Security exception" },
    { name = "openssl-macros", wrappers = ["openssl"],      reason = "proc-macro companion to openssl 0.10; same asx-rs WS-Security exception" },
]

# ── Skip entries for unavoidable transitive duplicates ───────────────────────
#
# Each entry documents WHY the duplicate exists and what would resolve it.
# Review and tighten on every annual dependency update pass.

[[bans.skip]]
name    = "thiserror"
version = "1"
reason  = "slatedb 0.13 and several ecosystem crates (foyer, object_store) still depend on thiserror 1.x. Workspace crates use thiserror 2. Resolve when slatedb bumps to thiserror 2."

[[bans.skip]]
name    = "thiserror-impl"
version = "1"
reason  = "proc-macro companion of thiserror 1.x; same root cause as thiserror duplicate."

[[bans.skip]]
name    = "hashbrown"
version = "0.14"
reason  = "indexmap 2.x depends on hashbrown 0.14. Ecosystem migration to 0.15+ in progress."

[[bans.skip]]
name    = "hashbrown"
version = "0.15"
reason  = "lru and tokio-util pull hashbrown 0.15. Resolves when upstream crates align on 0.16."

[[bans.skip]]
name    = "hashbrown"
version = "0.16"
reason  = "foyer-memory/slatedb pull hashbrown 0.16. Resolves when foyer aligns on 0.17."

[[bans.skip]]
name    = "foldhash"
version = "0.1"
reason  = "Companion to hashbrown 0.15; resolves with hashbrown 0.15 dedup."

[[bans.skip]]
name    = "getrandom"
version = "0.2"
reason  = "Some transitive deps still pull getrandom 0.2. Resolve with broader getrandom 0.3/0.4 adoption."

[[bans.skip]]
name    = "getrandom"
version = "0.3"
reason  = "rand 0.9 depends on getrandom 0.3; rand 0.10 pulls 0.4. Resolves when getrandom 0.4 adoption is complete."

[[bans.skip]]
name    = "rand"
version = "0.8"
reason  = "slatedb/foyer ecosystem pulls rand 0.8. Three-way split (0.8/0.9/0.10) until all deps align."

[[bans.skip]]
name    = "rand"
version = "0.9"
reason  = "Some deps pull rand 0.9 while workspace moves to rand 0.10. Resolve when all deps align."

[[bans.skip]]
name    = "rand_core"
version = "0.6"
reason  = "Companion to rand 0.8; three-way split (0.6/0.9/0.10)."

[[bans.skip]]
name    = "rand_core"
version = "0.9"
reason  = "Companion to rand 0.9; same root cause."

[[bans.skip]]
name    = "rustix"
version = "0.38"
reason  = "tokio/mio pull rustix 0.38; newer deps pull 1.x. Resolve when tokio aligns on rustix 1."

[[bans.skip]]
name    = "linux-raw-sys"
version = "0.4"
reason  = "Companion to rustix 0.38; same root cause."

[[bans.skip]]
name    = "nom"
version = "7"
reason  = "edifact-rs (edi-energy grammar layer) depends on nom 7. Resolve when edifact-rs migrates to nom 8."

[[bans.skip]]
name    = "winnow"
version = "0.6"
reason  = "toml_edit (build-time dep of cargo) pulls winnow 0.6. Workspace direct deps use 0.7."

[[bans.skip]]
name    = "lru"
version = "0.12"
reason  = "asx-rs pulls lru 0.12. Resolve when asx-rs updates."

# object_store 0.14 pulls digest 0.11 / md-5 0.11 / block-buffer 0.12 / cpufeatures 0.3 /
# crypto-common 0.2; xtask's pdf-extract (lopdf chain) pins the 0.10 generation.
# Safe to coexist — no shared serialization state across the version boundary.
[[bans.skip]]
name    = "digest"
version = "0.10"
reason  = "lopdf/pdf-extract (xtask) depends on digest 0.10; object_store 0.14 pulls digest 0.11. No shared state."

[[bans.skip]]
name    = "md-5"
version = "0.10"
reason  = "Companion to digest 0.10 (lopdf chain); object_store 0.14 pulls md-5 0.11."

[[bans.skip]]
name    = "block-buffer"
version = "0.10"
reason  = "Companion to digest 0.10 (lopdf chain); object_store 0.14 pulls block-buffer 0.12."

[[bans.skip]]
name    = "crypto-common"
version = "0.1"
reason  = "Companion to digest 0.10 (lopdf chain); object_store 0.14 pulls crypto-common 0.2."

[[bans.skip]]
name    = "cpufeatures"
version = "0.2"
reason  = "Companion to digest 0.10 (lopdf chain); object_store 0.14 pulls cpufeatures 0.3."

# reqwest version split: energy-api and newer HTTP clients use reqwest 0.13;
# asx-rs (AS4 transport) still depends on reqwest 0.12. Resolve when asx-rs updates.
[[bans.skip]]
name    = "reqwest"
version = "0.12"
reason  = "asx-rs depends on reqwest 0.12; energy-api and direct workspace deps use reqwest 0.13."

[[bans.skip]]
name    = "heck"
version = "0.4"
reason  = "proc-macro crates (clap_derive, enum-iterator-derive) still depend on heck 0.4."

# Windows crates version-skew: Microsoft publishes rapid minor bumps; ecosystem
# convergence lags. These are safe to skip — they do not share serialization state.
[[bans.skip]]
name    = "windows-link"
version = "0.1"
reason  = "Windows crate ecosystem version skew."

[[bans.skip]]
name    = "windows-sys"
version = "0.59"
reason  = "Windows crate ecosystem version skew."

[[bans.skip]]
name    = "itertools"
version = "0.14"
reason  = "foyer-memory (via slatedb) depends on itertools 0.14.x while rest of workspace uses 0.15."

# unicode-width 0.1 skip removed: dependency tree now uses only 0.2.

[advisories]
ignore = [
    # RUSTSEC-2025-0141: bincode 1.x unmaintained.
    # Pulled transitively by slatedb → foyer. The crate is functionally complete
    # (the authors declared v1.3.3 final); no security impact in our usage
    # (serialization for internal SlateDB structures, not user-controlled input).
    # Resolve when slatedb migrates to bincode 2.x or an alternative.
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.x pulled by slatedb/foyer; functionally complete, no CVE, no user-controlled input" },
    # RUSTSEC-2024-0436: paste macro unmaintained (dtolnay archived the repo).
    # The crate is syntactically stable; no security surface. Used by slatedb
    # proc-macro machinery. Resolve when slatedb migrates away.
    { id = "RUSTSEC-2024-0436", reason = "paste macro pulled by slatedb; no CVE, compile-time only, no runtime security surface" },
    # RUSTSEC-2026-0192: ttf-parser unmaintained (harfbuzz team migrating to skrifa).
    # No CVE, no security vulnerability — maintenance announcement only.
    # Pulled transitively by xtask → pdf-extract → lopdf → ttf-parser.
    # Impact: xtask dev tooling only; no production or library code path.
    # Resolution: bump pdf-extract when a release depending on skrifa is available.
    { id = "RUSTSEC-2026-0192", reason = "ttf-parser maintenance announcement only (no CVE); reachable only via xtask pdf tooling, not production code" },
]
