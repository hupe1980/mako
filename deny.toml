# p256/ecdsa (energy-api) still pins sha2 0.10, pulling the 2022-generation digest
# chain (digest 0.10 / block-buffer 0.10 / crypto-common 0.1 / cpufeatures 0.2).
# asx-rs + lopdf 0.43 both use sha2 0.11 (RustCrypto 2024 generation), so that
# side is no longer a source of these duplicates.
# Resolve when the p256/ecdsa ecosystem updates to sha2 0.11.
[[bans.skip]]
name    = "digest"
version = "0.10"
reason  = "p256/ecdsa/rfc6979 (energy-api) pulls digest 0.10 via sha2 0.10; asx-rs + lopdf 0.43 use digest 0.11 via sha2 0.11. Resolve when p256 ecosystem updates."

[[bans.skip]]
name    = "block-buffer"
version = "0.10"
reason  = "Companion to digest 0.10 (p256/sha2 0.10 chain); asx-rs + lopdf 0.43 pull block-buffer 0.12 via digest 0.11."

[[bans.skip]]
name    = "crypto-common"
version = "0.1"
reason  = "Companion to digest 0.10 (p256/sha2 0.10 chain); asx-rs + lopdf 0.43 pull crypto-common 0.2 via digest 0.11."

[[bans.skip]]
name    = "cpufeatures"
version = "0.2"
reason  = "p256/sha2 0.10 chain still pulls cpufeatures 0.2; asx-rs + lopdf 0.43 pull cpufeatures 0.3 via sha2 0.11. Resolve when p256 ecosystem updates."

# ── asx-rs vs p256/ecdsa/energy-api crypto split ────────────────────────────────
# asx-rs uses sha2 0.11 / hmac 0.13 (RustCrypto 2024 update). lopdf 0.43 also uses
# sha2 0.11, so xtask is no longer a source of crypto version splits.
# p256/ecdsa/rfc6979 (energy-api ECDSA, makod HMAC) are still on sha2 0.10 / hmac 0.12.
# No shared key material or verification state across the version boundary.
# Resolve when p256/ecdsa ecosystem aligns on sha2 0.11 / hmac 0.13.
[[bans.skip]]
name    = "sha2"
version = "0.10"
reason  = "p256/ecdsa/rfc6979 (energy-api) pin sha2 0.10; asx-rs + lopdf 0.43 use sha2 0.11. Resolve when p256 ecosystem updates."

[[bans.skip]]
name    = "sha2"
version = "0.11"
reason  = "asx-rs + lopdf 0.43 use sha2 0.11 (RustCrypto 2024); p256/ecdsa ecosystem pins sha2 0.10. See companion sha2 0.10 entry."

[[bans.skip]]
name    = "hmac"
version = "0.12"
reason  = "rfc6979/ecdsa/p256 (energy-api, makod) uses hmac 0.12; asx-rs WS-Security uses hmac 0.13. Resolve when p256/ecdsa aligns on hmac 0.13."

[[bans.skip]]
name    = "hmac"
version = "0.13"
reason  = "asx-rs WS-Security uses hmac 0.13 (RustCrypto 2024); p256/ecdsa ecosystem pins hmac 0.12. See companion hmac 0.12 entry."

# ── asx-rs vs object_store/slatedb quick-xml split ──────────────────────────────
# asx-rs (AS4 SOAP/ebMS3 parsing) pins quick-xml 0.41; object_store (slatedb cloud) pins 0.40.
# Both versions carry RUSTSEC-2026-0194 / RUSTSEC-2026-0195, exempted in [advisories]
# with usage-context justification (authenticated XML sources, not attacker-controlled).
# Resolve when asx-rs or object_store updates to a common quick-xml version.
[[bans.skip]]
name    = "quick-xml"
version = "0.40"
reason  = "object_store (slatedb cloud backend) pins quick-xml 0.40; asx-rs uses quick-xml 0.41. RUSTSEC-2026-0194/0195 exempted in [advisories]."

[[bans.skip]]
name    = "quick-xml"
version = "0.41"
reason  = "asx-rs AS4 SOAP parsing uses quick-xml 0.41; object_store (slatedb) pins quick-xml 0.40. See companion quick-xml 0.40 entry."

[[bans.skip]]
name    = "heck"
version = "0.4"
reason  = "proc-macro crates (clap_derive, enum-iterator-derive) still depend on heck 0.4."

# Windows crates version-skew: Microsoft publishes rapid minor bumps; ecosystem
