# Windows crates version-skew: Microsoft publishes rapid minor bumps; ecosystem
# convergence lags. These are safe to skip — they do not share serialization state.
[[bans.skip]]
name    = "windows-core"
version = "0.61"
reason  = "Windows crate ecosystem version skew; no serialization or ABI shared state."

[[bans.skip]]
