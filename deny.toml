[advisories]
ignore = [
    # RUSTSEC-2025-0141: bincode 1.x unmaintained.
    # Pulled transitively by slatedb → foyer. The crate is functionally complete
    # (the authors declared v1.3.3 final); no security impact in our usage
    # (serialization for internal SlateDB structures, not user-controlled input).
    # Resolve when slatedb migrates to bincode 2.x or an alternative.
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.x pulled by slatedb/foyer; functionally complete, no CVE, no user-controlled input" },
    # RUSTSEC-2024-0436: paste macro unmaintained (dtolnay archived the repo).
    # The crate is syntactically stable; no security surface. Used by slatedb
    # proc-macro machinery. Resolve when slatedb migrates away.
    { id = "RUSTSEC-2024-0436", reason = "paste macro pulled by slatedb; no CVE, compile-time only, no runtime security surface" },
    # RUSTSEC-2026-0192: ttf-parser unmaintained (harfbuzz team migrating to skrifa).
    # No CVE, no security vulnerability — maintenance announcement only.
    # Pulled transitively by xtask → pdf-extract → lopdf → ttf-parser.
    # Impact: xtask dev tooling only; no production or library code path.
    # Resolution: bump pdf-extract when a release depending on skrifa is available.
    { id = "RUSTSEC-2026-0192", reason = "ttf-parser maintenance announcement only (no CVE); reachable only via xtask pdf tooling, not production code" },
    # RUSTSEC-2026-0194: quick-xml 0.40.x O(N²) attribute-dedup scan on start tags.
    # Exploitable only when iterating attributes of a start tag with many *distinct*
    # attribute names from untrusted XML. In our usage:
    #   - object_store (slatedb/cloud): parses S3/GCS/Azure XML responses from
    #     authenticated endpoints — not attacker-controlled.
    #   - asx-rs (mako-as4): parses AS4 SOAP/ebMS3 envelopes from BDEW/ENTSO-E
    #     counterparties over mutually-authenticated AS4 channels, not public internet.
    # Neither path accepts attacker-supplied XML without prior authentication.
    # Resolution: upgrade asx-rs + object_store once they release with quick-xml ≥ 0.41.
    { id = "RUSTSEC-2026-0194", reason = "quick-xml O(N²) DoS; all XML consumers in this workspace parse from authenticated sources (object_store → cloud APIs, asx-rs → AS4 channels) — not attacker-controlled input" },
    # RUSTSEC-2026-0195: quick-xml 0.40.x NsReader unbounded namespace-declaration
    # allocation (memory exhaustion) — same upstream version constraint as 0194.
    # Exploitable only when parsing XML with many namespace declarations from
    # attacker-controlled input. Same usage analysis applies: object_store parses
    # authenticated cloud-provider responses; asx-rs parses AS4 envelopes over
    # mutually-authenticated channels. Neither path is reachable from untrusted input.
    # Resolution: upgrade asx-rs + object_store once they release with quick-xml ≥ 0.41.
    { id = "RUSTSEC-2026-0195", reason = "quick-xml NsReader memory-exhaustion DoS; all XML consumers in this workspace parse from authenticated sources — not attacker-controlled input. Same upstream constraint as RUSTSEC-2026-0194." },
    # RUSTSEC-2025-0111: rustls-pemfile 1.x unmaintained.
    # Pulled transitively by testcontainers → bollard. Dev-only dependency (integration
    # tests only); not present in any production binary. Resolved when testcontainers
    # upgrades to rustls-pemfile 2.x.
    { id = "RUSTSEC-2025-0111", reason = "rustls-pemfile 1.x unmaintained; dev-only dep via testcontainers — not in production binaries" },
    # RUSTSEC-2025-0134: tokio-tar PAX header smuggling vulnerability.
    # Pulled transitively by testcontainers → bollard. Dev-only dependency (integration
    # tests only); not present in any production binary. tokio-tar is used to download
    # Docker images in tests, not to extract user-supplied archives.
    # Resolve when testcontainers releases with a patched bollard.
    { id = "RUSTSEC-2025-0134", reason = "tokio-tar PAX smuggling; dev-only dep via testcontainers/bollard — not in production binaries, no user-supplied archive input" },
    # RUSTSEC-2023-0071: rsa Marvin Attack timing side-channel.
    # rsa is pulled transitively by mako-as4 → asx-rs → WS-Security XML crypto.
    # The rsa crate is used for PKCS#1 signature verification of AS4 messages from
    # trusted BDEW counterparties — not for key decryption in adversarial settings.
    # The Marvin Attack requires an attacker to observe RSA decryption timing to recover
    # a private key; this usage only verifies signatures (public-key operation).
    # Resolve when asx-rs updates to a mitigated rsa version.
    { id = "RUSTSEC-2023-0071", reason = "rsa Marvin timing attack; only used for signature verification (public-key operation) via asx-rs WS-Security — not for key decryption" },
]

