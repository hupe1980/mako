title: mako — German Energy Market Platform in Rust
description: >-
  Full-stack German energy market communication (BDEW MaKo / EDI@Energy) in Rust.
  17 production microservices covering EDIFACT parsing (all 247 Prüfidentifikatoren),
  event-sourced MaKo process runtime, NNE/EEG settlement, retail billing, SEPA payments,
  AS4 transport, AI orchestration, and BO4E ERP webhooks. FV2026-10-01 compliant.
tagline: "Full-stack German energy market communication in Rust — EDIFACT · 45+ MaKo workflows · NNE/EEG settlement · 17 microservices"
url: "https://hupe1980.github.io"
baseurl: "/mako"
lang: en

# ── Repository ────────────────────────────────────────────────────────────────
repository: hupe1980/mako
github_username: hupe1980

# ── Theme ─────────────────────────────────────────────────────────────────────
# Just the Docs — the canonical documentation theme for technical Rust projects.
# https://just-the-docs.com/
remote_theme: just-the-docs/just-the-docs@v0.11.0

# ── Appearance ────────────────────────────────────────────────────────────────
color_scheme: light   # initial scheme; the sidebar-footer toggle (nav_footer_custom.html) switches light/dark and persists in localStorage
logo: "/assets/img/mako-logo.svg"
favicon_ico: "/assets/img/mako-logo.svg"

# ── Navigation ────────────────────────────────────────────────────────────────
# Navigation order is controlled by `nav_order` front matter on each page.
# We use a two-level hierarchy:  section nav_order + page nav_order.

# Enable heading anchors in the table of contents
heading_anchors: true

# ── Search ────────────────────────────────────────────────────────────────────
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-./]+/
  rel_url: true
  button: false
  focus_shortcut_key: "k"

# ── Aux links (top right) ─────────────────────────────────────────────────────
aux_links:
  "GitHub":
    - "https://github.com/hupe1980/mako"
  "edi-energy":
    - "https://crates.io/crates/edi-energy"
  "mako-engine":
    - "https://crates.io/crates/mako-engine"

aux_links_new_tab: true

# ── Footer ────────────────────────────────────────────────────────────────────
footer_content: >-
  <strong>mako</strong> — German energy market communication in Rust.
  &nbsp;·&nbsp;
  <a href="https://github.com/hupe1980/mako/blob/main/LICENSE-MIT">MIT</a>
  or
  <a href="https://github.com/hupe1980/mako/blob/main/LICENSE-APACHE">Apache 2.0</a>
  &nbsp;·&nbsp;
  Conforms to <a href="https://www.edi-energy.de/">BDEW EDI@Energy</a>
  FV2025-10-01 + FV2026-10-01

back_to_top: true
back_to_top_text: "Back to top"

# ── Callouts ─────────────────────────────────────────────────────────────────
callouts_level: quiet   # "quiet" | "loud" — controls default callout style
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# ── Mermaid diagrams ─────────────────────────────────────────────────────────
mermaid:
  version: "11"

# ── Markdown ─────────────────────────────────────────────────────────────────
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

highlighter: rouge

# ── Permalink style ──────────────────────────────────────────────────────────
# "pretty" generates /page-name/index.html so GitHub Pages serves the page
# for both /page-name and /page-name/ (no trailing-slash 404s).
permalink: pretty

# ── Collections / plugins ────────────────────────────────────────────────────
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-github-metadata

# ── SEO ───────────────────────────────────────────────────────────────────────
twitter:
  username: ""
social:
  name: mako
  links:
    - "https://github.com/hupe1980/mako"

# ── Defaults ─────────────────────────────────────────────────────────────────
defaults:
  - scope:
      path: ""
    values:
      layout: default
      image: /assets/img/mako-logo.svg
