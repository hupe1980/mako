title: mako
description: >-
  Production-grade Rust library for German energy market communication (BDEW
  MaKo / EDI@Energy). EDIFACT parsing · AHB validation · event-sourced process
  runtime · AS4 transport · regulatory deadlines.
tagline: "EDI@Energy for Rust — production-grade MaKo workflows"
url: "https://hupe1980.github.io"
baseurl: "/edi-energy-rs"
lang: en

# ── Repository ────────────────────────────────────────────────────────────────
repository: hupe1980/edi-energy-rs
github_username: hupe1980

# ── Theme ─────────────────────────────────────────────────────────────────────
# Just the Docs — the canonical documentation theme for technical Rust projects.
# https://just-the-docs.com/
remote_theme: just-the-docs/just-the-docs@v0.10.0

# ── Appearance ────────────────────────────────────────────────────────────────
color_scheme: light   # "light" | "dark" — users can toggle in sidebar
logo: "/assets/img/mako-logo.svg"
favicon_ico: "/assets/img/favicon.ico"

# ── Navigation ────────────────────────────────────────────────────────────────
# Navigation order is controlled by `nav_order` front matter on each page.
# We use a two-level hierarchy:  section nav_order + page nav_order.

# Enable heading anchors in the table of contents
heading_anchors: true

# ── Search ────────────────────────────────────────────────────────────────────
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s\-./]+/
  rel_url: true
  button: false
  focus_shortcut_key: "k"

# ── Aux links (top right) ─────────────────────────────────────────────────────
aux_links:
  "GitHub":
    - "https://github.com/hupe1980/edi-energy-rs"
  "crates.io":
    - "https://crates.io/crates/edi-energy"

aux_links_new_tab: true

# ── Footer ────────────────────────────────────────────────────────────────────
footer_content: >-
  <a href="https://github.com/hupe1980/edi-energy-rs/blob/main/LICENSE-MIT">MIT</a>
  or
  <a href="https://github.com/hupe1980/edi-energy-rs/blob/main/LICENSE-APACHE">Apache 2.0</a>
  &nbsp;·&nbsp;
  <a href="https://github.com/hupe1980/edi-energy-rs/blob/main/CHANGELOG.md">Changelog</a>
  &nbsp;·&nbsp;
  Conforms to <a href="https://www.edi-energy.de/">BDEW EDI@Energy</a>

back_to_top: true
back_to_top_text: "Back to top"

# ── Callouts ─────────────────────────────────────────────────────────────────
callouts_level: quiet   # "quiet" | "loud" — controls default callout style
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# ── Mermaid diagrams ─────────────────────────────────────────────────────────
mermaid:
  version: "11"

# ── Markdown ─────────────────────────────────────────────────────────────────
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

highlighter: rouge

# ── Collections / plugins ────────────────────────────────────────────────────
plugins:
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-github-metadata

# ── SEO ───────────────────────────────────────────────────────────────────────
twitter:
  username: ""
social:
  name: mako
  links:
    - "https://github.com/hupe1980/edi-energy-rs"

# ── Defaults ─────────────────────────────────────────────────────────────────
defaults:
  - scope:
      path: ""
    values:
      layout: default
      image: /assets/img/og-card.png
