<footer class="site-footer">
  <button type="button" id="mako-theme-toggle" class="mako-theme-toggle"
          aria-label="Toggle color scheme" title="Toggle light / dark">
    <span class="mako-theme-toggle__icon" aria-hidden="true">◐</span>
    <span class="mako-theme-toggle__label">Theme</span>
  </button>
</footer>

<script>
  (function () {
    function apply(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      if (window.jtd && typeof window.jtd.setTheme === 'function') {
        window.jtd.setTheme(theme);
      }
    }
    function preferred() {
      var stored = null;
      try { stored = localStorage.getItem('mako-theme'); } catch (e) { /* private mode */ }
      if (stored === 'light' || stored === 'dark') { return stored; }
      return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
        ? 'dark' : 'light';
    }
    function init() {
      apply(preferred());
      var btn = document.getElementById('mako-theme-toggle');
      if (!btn) { return; }
      btn.addEventListener('click', function () {
        var next = document.documentElement.getAttribute('data-theme') === 'dark'
          ? 'light' : 'dark';
        try { localStorage.setItem('mako-theme', next); } catch (e) { /* private mode */ }
        apply(next);
      });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
