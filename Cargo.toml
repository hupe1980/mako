[workspace]
resolver = "2"
members = [
    "crates/edi-energy",
    "crates/energy-api",
    "xtask",
]
exclude = ["fuzz"]

[workspace.package]
version     = "0.1.0"
authors     = ["hupe1980"]
edition     = "2024"
license     = "MIT OR Apache-2.0"
repository  = "https://github.com/hupe1980/mako"
rust-version = "1.85"

[workspace.dependencies]
edifact-rs  = "~0.10"
miette      = { version = "7", features = ["fancy-no-syscall"] }
serde_json  = "1"
thiserror   = "2"
time        = { version = "0.3", features = ["std", "macros"] }

# ── Release profile ─────────────────────────────────────────────────────────
[profile.release]
opt-level     = 3
lto           = "thin"
codegen-units = 1
strip         = "debuginfo"
