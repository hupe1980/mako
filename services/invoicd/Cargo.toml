[package]
name             = "invoicd"
version.workspace = true
description      = "INVOIC plausibility-check daemon for German energy market (LF role)"
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish          = false

[[bin]]
name = "invoicd"
path = "src/main.rs"

[dependencies]
invoic-checker  = { workspace = true }
mako-markt      = { workspace = true, features = ["makod-client", "marktd-client"] }
mako-nne        = { workspace = true }
mako-edm        = { path = "../../crates/mako-edm" }
rubo4e          = { workspace = true }

anyhow             = { workspace = true }
thiserror          = { workspace = true }
axum               = { version = "0.8", features = [] }
clap               = { version = "4", features = ["derive", "env"] }
serde              = { workspace = true }
toml               = { version = "0.8", default-features = false, features = ["parse"] }
serde_json         = { workspace = true }
time               = { workspace = true }
uuid               = { workspace = true }
tokio              = { version = "1", features = ["full"] }
tokio-util         = { workspace = true }
tracing            = "0.1"
mako-service       = { workspace = true, features = ["otel", "cedar", "oidc"] }
rmcp               = { workspace = true }
schemars           = { workspace = true }
secrecy            = "0.10"
subtle             = "2"
reqwest            = { workspace = true }
sqlx               = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "time", "json", "migrate"] }
