[package]
name        = "accountingd"
description = "Massenkontokorrent / Customer Account Ledger daemon (LF role). Kundenkonto running ledger, Offene Posten AR, Zahlungszuordnung, Abschlagsmanagement, Mahnwesen (Mahnstufe 1-3), SEPA-Lastschrift pain.008 XML, Bankruecklast, Jahresabschluss. Ingest de.billing.rechnung.erstellt + de.invoic.receipt.settled + de.eeg.verguetung.berechnet. Port :9380."
version.workspace     = true
authors.workspace     = true
edition.workspace     = true
license.workspace     = true
repository.workspace  = true
rust-version.workspace = true
publish         = false

[lib]
name = "accountingd"
path = "src/lib.rs"

[[bin]]
name = "accountingd"
path = "src/main.rs"

[dependencies]
mako-service = { workspace = true, features = ["oidc", "cedar", "otel"] }
rmcp         = { workspace = true }
schemars     = { workspace = true }
axum         = { version = "0.8" }
sqlx         = { version = "0.8", features = ["postgres", "runtime-tokio-rustls", "time", "uuid", "json", "rust_decimal"] }
tokio        = { version = "1", features = ["full"] }
serde        = { workspace = true, features = ["derive"] }
serde_json   = { workspace = true }
time         = { workspace = true }
uuid         = { workspace = true, features = ["v4", "serde"] }
rust_decimal = { workspace = true }
rubo4e       = { workspace = true }
reqwest      = { workspace = true }
sepa         = { workspace = true, features = ["json"] }
tracing      = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tower-http   = { version = "0.6" }
anyhow       = "1"
secrecy      = { version = "0.10" }
