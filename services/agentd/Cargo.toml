[package]
name        = "agentd"
description = "Multi-agent LLM orchestration daemon for mako"
version.workspace     = true
authors.workspace     = true
edition.workspace     = true
license.workspace     = true
repository.workspace  = true
rust-version.workspace = true

[lib]
name = "agentd"
path = "src/lib.rs"

[[bin]]
name = "agentd"
path = "src/main.rs"

[dependencies]
mako-service = { workspace = true, features = ["otel", "oidc", "cedar"] }
axum         = { version = "0.8" }
tokio        = { version = "1", features = ["full"] }
serde        = { workspace = true, features = ["derive"] }
serde_json   = { workspace = true }
time         = { workspace = true }
uuid         = { workspace = true, features = ["v4", "serde"] }
tracing      = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow       = "1"
reqwest      = { workspace = true }
tokio-util   = { workspace = true }
secrecy      = { version = "0.10" }
# RAG vector store — LanceDB (persistent, S3/GCS/Azure/local)
# rubo4e 0.7.0 fixed BUG-1 (time = "0.3" instead of pinned "0.3.53"), enabling lancedb.
lancedb      = { workspace = true }
# arrow 58 — matches lancedb 0.31 transitive dep. Declared explicitly here so
# the agentd binary gets arrow 58 types that are compatible with lancedb.
# (edmd uses arrow 57 via iceberg — they coexist as separate crate versions.)
arrow-array  = { version = "58", default-features = false }
arrow-schema = { version = "58", default-features = false }
futures      = { version = "0.3", default-features = false, features = ["std"] }
# AWS Bedrock SigV4 (manual — avoids full AWS SDK)
hmac         = { version = "0.12", default-features = false }
sha2         = { version = "0.10", default-features = false }
hex          = { version = "0.4" }
# Base64 for Bedrock JSON body encoding check
base64       = { version = "0.22" }
