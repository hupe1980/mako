[package]
name             = "makod"
version.workspace          = true
description      = "Main binary for running the Mako process engine"
authors.workspace          = true
edition.workspace          = true
license.workspace          = true
repository.workspace       = true
rust-version.workspace     = true
publish          = false

[[bin]]
name = "makod"
path = "src/main.rs"

[lib]
name = "makod"
path = "src/lib.rs"

[dependencies]
mako-engine      = { path = "../../crates/mako-engine", features = ["slatedb"] }
mako-gpke        = { path = "../../crates/mako-gpke" }
mako-wim         = { path = "../../crates/mako-wim" }
mako-geli-gas    = { path = "../../crates/mako-geli-gas" }
mako-wim-gas     = { path = "../../crates/mako-wim-gas" }
dvgw-edi         = { path = "../../crates/dvgw-edi" }
mako-gabi-gas    = { path = "../../crates/mako-gabi-gas" }
mako-mabis       = { path = "../../crates/mako-mabis" }
mako-redispatch  = { path = "../../crates/mako-redispatch" }
edifact-rs       = { workspace = true }
mako-as4     = { path = "../../crates/mako-as4", features = ["server"] }
energy-api   = { path = "../../crates/energy-api", features = ["server", "client"] }
rubo4e       = { workspace = true }
rust_decimal = { workspace = true }
asx-rs       = { version = "0.5", features = ["as4", "client", "interop-strict", "server"] }
edi-energy   = { path = "../../crates/edi-energy", default-features = false, features = [
    "utilmd", "mscons", "aperak", "contrl", "invoic", "remadv",
    "orders", "iftsta", "insrpt", "reqote", "partin", "ordchg", "ordrsp",
    "quotes", "comdis", "pricat", "utilts",
] }

anyhow             = { workspace = true }
axum               = { version = "0.8", features = [] }
clap               = { version = "4", features = ["derive", "env"] }
fd-lock            = "4"
object_store       = { version = "0.14", features = ["aws", "gcp", "azure"] }
serde              = { version = "1", features = ["derive"] }
toml               = { version = "0.8", default-features = false, features = ["parse"] }
serde_json         = { workspace = true }
cedar-policy       = "4"
jsonwebtoken       = "9"
thiserror          = { workspace = true }
subtle             = "2"
time               = { workspace = true }
tokio              = { version = "1", features = ["full"] }
tokio-util         = { version = "0.7", features = ["rt"] }
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
uuid               = { workspace = true }
reqwest            = { version = "0.13", default-features = false, features = ["json", "rustls", "query"] }
hmac               = { version = "0.12", features = ["std"] }
secrecy            = "0.10"
sha2               = "0.10"
utoipa             = { version = "5", features = ["axum_extras", "uuid", "time"] }
utoipa-axum        = "0.2"
utoipa-swagger-ui  = { version = "9", features = ["axum"] }
rmcp = { version = "2.0.0", features = ["transport-io", "transport-streamable-http-server"] }
schemars = { version = "1.2.1", features = ["chrono04"] }

[dev-dependencies]
# Adds the "testing" feature on top of the production "slatedb" dep,
# enabling InMemoryEventStore, NoopDeadLetterSink, InMemoryInboxStore.
# Must never appear in a production build.
mako-engine  = { path = "../../crates/mako-engine", features = ["testing"] }
tokio        = { version = "1", features = ["full"] }
serde_json   = { workspace = true }
time         = { workspace = true }

# ── Role-isolation feature flags ─────────────────────────────────────────────
#
# Use these to build purpose-specific binaries that exclude code for roles
# not deployed by the operator. This reduces binary size, eliminates
# compile-time registration of unwanted PIDs, and provides legal traceability
# (binary SHA identifies role scope for BNetzA audit).
#
# Deployment profiles:
#   lf-only       = ["role-lf"]                         # pure LF supplier
#   nb-only       = ["role-nb"]                         # pure DSO/GNB
#   nb-strom-only = ["role-nb-strom"]                   # Strom DSO only
#   nb-gas-only   = ["role-nb-gas"]                     # Gas GNB only
#   msb-only      = ["role-msb"]                        # pure MSB
#   integrated    = ["role-lf","role-nb","role-msb"]    # Stadtwerk/integrated
#
# Default (no feature flags): all roles active — backwards-compatible with
# existing deployments that have not yet migrated to role-scoped builds.
[features]
# ── Per-Sparte, per-role granular flags ──────────────────────────────────────
# Strom roles
role-lf-strom  = []  # LF Strom: gpke-* LF-side, wim LF-affected
role-nb-strom  = []  # NB/DSO Strom: gpke-* NB-side, Sperrung, Konfiguration,
                     #   UTILTS, MSCONS, WiM NB-side, PARTIN 37000-37006,
                     #   INVOIC 31001/31002/31005/31006
role-msb-strom = []  # MSB Strom: wim-* Messstellenbetrieb
# Gas roles
role-lf-gas    = []  # LF Gas (LFG): geli-gas-* LF-side
role-nb-gas    = []  # GNB: geli-gas-* NB-side, Sperrung Gas, PARTIN 37008-37014,
                     #   INVOIC 31007/31008/31011, gabi-gas-mmma (13013)
role-msb-gas   = []  # gMSB: wim-gas-* Messstellenbetrieb Gas
# ── Composite convenience flags ───────────────────────────────────────────────
role-lf  = ["role-lf-strom",  "role-lf-gas"]   # dual-fuel LF (most common)
role-nb  = ["role-nb-strom",  "role-nb-gas"]    # combined DSO+GNB
role-msb = ["role-msb-strom", "role-msb-gas"]   # combined MSB
