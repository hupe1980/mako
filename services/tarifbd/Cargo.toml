[package]
name        = "tarifbd"
description = "Product and Tariff Catalog daemon (LF role). Single source of truth for retail energy tariffs (Eintarif/Zweitarif/RLM), Energiedienstleistungen, Telco/Internet bundle products, Tarifpreisblatt JSONB, MaLo->product assignment, EPEX Spot day-ahead prices for para.41a dynamic tariffs. Port :9080."
version.workspace     = true
authors.workspace     = true
edition.workspace     = true
license.workspace     = true
repository.workspace  = true
rust-version.workspace = true

[[bin]]
name = "tarifbd"
path = "src/main.rs"

[dependencies]
mako-service = { workspace = true, features = ["oidc", "cedar", "otel"] }
rmcp         = { workspace = true }
schemars     = { workspace = true }
rubo4e       = { workspace = true }
axum         = { version = "0.8" }
sqlx         = { version = "0.8", features = ["postgres", "runtime-tokio-rustls", "time", "uuid", "json", "rust_decimal"] }
tokio        = { version = "1", features = ["full"] }
serde        = { workspace = true, features = ["derive"] }
serde_json   = { workspace = true }
time         = { workspace = true }
uuid         = { workspace = true, features = ["v4", "serde"] }
rust_decimal = { workspace = true }
rust_decimal_macros = "1"
tracing      = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tower-http   = { version = "0.6" }
anyhow       = "1"
secrecy      = { version = "0.10" }
reqwest      = { workspace = true }
