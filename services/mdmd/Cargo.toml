[package]
name             = "mdmd"
version.workspace = true
description      = "Master data daemon for German energy market (MaKo/MDM)"
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish          = false

[[bin]]
name = "mdmd"
path = "src/main.rs"

[lib]
name = "mdmd"
path = "src/lib.rs"

[dependencies]
mako-mdm  = { path = "../../crates/mako-mdm", features = ["makod-client"] }
rubo4e    = { workspace = true, features = ["sqlx"] }

anyhow             = { workspace = true }
thiserror          = { workspace = true }
axum               = { version = "0.8", features = [] }
clap               = { version = "4", features = ["derive", "env"] }
serde              = { version = "1", features = ["derive"] }
serde_json         = { workspace = true }
toml               = { version = "0.8", default-features = false, features = ["parse"] }
time               = { workspace = true }
uuid               = { workspace = true }
tokio              = { version = "1", features = ["full"] }
tokio-util         = { version = "0.7", features = ["rt"] }
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
secrecy            = "0.10"
subtle             = "2"
hmac               = { version = "0.12", features = ["std"] }
sha2               = "0.10"
jsonwebtoken       = "9"
jiff               = "0.2"
reqwest            = { version = "0.13", default-features = false, features = ["json", "rustls", "query"] }
utoipa             = { version = "5", features = ["axum_extras", "uuid", "time"] }
utoipa-axum        = "0.2"
utoipa-swagger-ui  = { version = "9", features = ["axum"] }
sqlx               = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "time", "json", "migrate"] }

[dev-dependencies]
mako-mdm   = { path = "../../crates/mako-mdm", features = ["testing"] }
tokio      = { version = "1", features = ["full"] }
serde_json = { workspace = true }
