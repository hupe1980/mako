[package]
name        = "nis-syncd"
description = "NIS/GIS grid topology import adapter — pushes MaLo grid records to marktd; stateless"
version.workspace     = true
authors.workspace     = true
edition.workspace     = true
license.workspace     = true
repository.workspace  = true
rust-version.workspace = true
publish         = false

[lib]
name = "nis_syncd"
path = "src/lib.rs"

[[bin]]
name = "nis-syncd"
path = "src/main.rs"

[dependencies]
mako-markt   = { workspace = true, features = ["marktd-client"] }
mako-service = { workspace = true, features = ["oidc", "cedar", "otel"] }
axum         = { version = "0.8" }
tokio        = { version = "1", features = ["full"] }
serde        = { workspace = true, features = ["derive"] }
serde_json   = { workspace = true }
time         = { workspace = true }
uuid         = { workspace = true, features = ["v4"] }
rmcp         = { workspace = true }
reqwest      = { workspace = true }
tokio-util   = { workspace = true }
tracing      = "0.1"
anyhow       = "1"
secrecy      = { version = "0.10" }
