[package]
name        = "nis-syncd"
description = "NIS/GIS grid topology import adapter — pushes MaLo grid records to marktd; stateless"
version.workspace     = true
authors.workspace     = true
edition.workspace     = true
license.workspace     = true
repository.workspace  = true
rust-version.workspace = true

[[bin]]
name = "nis-syncd"
path = "src/main.rs"

[dependencies]
mako-markt   = { workspace = true, features = ["marktd-client"] }
mako-service = { workspace = true, features = ["oidc", "cedar", "otel"] }
axum         = { version = "0.8" }
tokio        = { version = "1", features = ["full"] }
serde        = { workspace = true, features = ["derive"] }
serde_json   = { workspace = true }
time         = { workspace = true }
uuid         = { workspace = true, features = ["v4"] }
tracing      = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow       = "1"
reqwest      = { version = "0.13", default-features = false, features = ["json", "rustls"] }
secrecy      = { version = "0.10" }
