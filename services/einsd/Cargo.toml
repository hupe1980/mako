[package]
name        = "einsd"
description = "Einspeiser Registry + EEG Settlement daemon (port :9180). Plant register, EEG Verguetung, Direktvermarktung Marktpraemie, Post-EEG Spot, Mieterstrom, 180-day Foerderendedatum alerts."
version.workspace     = true
authors.workspace     = true
edition.workspace     = true
license.workspace     = true
repository.workspace  = true
rust-version.workspace = true

[lib]
name = "einsd"
path = "src/lib.rs"

[[bin]]
name = "einsd"
path = "src/main.rs"

[dependencies]
mako-service = { workspace = true, features = ["oidc", "cedar", "otel"] }
billing      = { workspace = true }
eeg-billing  = { path = "../../crates/eeg-billing" }
rmcp         = { workspace = true }
schemars     = { workspace = true }
axum         = { version = "0.8" }
sqlx         = { version = "0.8", features = ["postgres", "runtime-tokio-rustls", "time", "uuid", "json", "rust_decimal"] }
tokio        = { version = "1", features = ["full"] }
serde        = { workspace = true, features = ["derive"] }
serde_json   = { workspace = true }
time         = { workspace = true }
uuid         = { workspace = true, features = ["v4", "serde"] }
rust_decimal = { workspace = true }
rust_decimal_macros = "1"
tokio-util   = { workspace = true }
reqwest      = { workspace = true }
tracing      = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tower-http   = { version = "0.6" }
anyhow       = "1"
secrecy      = { version = "0.10" }


[dev-dependencies]
time = { workspace = true }
