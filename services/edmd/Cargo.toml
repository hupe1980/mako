[package]
name             = "edmd"
version.workspace = true
description      = "Energy Data Management daemon — MSCONS storage, time-series API, Mehr-/Mindermengen imbalance"
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
publish          = false

[[bin]]
name = "edmd"
path = "src/main.rs"

[lib]
name = "edmd"
path = "src/lib.rs"

[dependencies]
mako-markt = { workspace = true, features = ["marktd-client"] }
mako-edm  = { workspace = true }
rubo4e     = { workspace = true }

anyhow             = { workspace = true }
thiserror          = { workspace = true }
axum               = { version = "0.8", features = [] }
clap               = { version = "4", features = ["derive", "env"] }
serde              = { workspace = true }
toml               = { version = "0.8", default-features = false, features = ["parse"] }
serde_json         = { workspace = true }
time               = { workspace = true }
uuid               = { workspace = true }
tokio              = { version = "1", features = ["full"] }
tokio-util         = { workspace = true }
tracing            = "0.1"
mako-service       = { workspace = true, features = ["otel", "cedar", "oidc"] }
rmcp               = { workspace = true }
schemars           = { workspace = true }
secrecy            = "0.10"
subtle             = "2"
reqwest            = { workspace = true }
sqlx               = { version = "0.8", features = ["runtime-tokio-rustls", "postgres", "uuid", "time", "json", "migrate"] }
rust_decimal       = { workspace = true }

[dev-dependencies]
mako-edm  = { workspace = true, features = ["testing"] }
tokio     = { version = "1", features = ["full"] }
